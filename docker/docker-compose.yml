version: "3.9"

# spins up 3 node replicas + gateway:
#   docker compose -f docker/docker-compose.yml up --build
# KV_NODES below is the only place node count is configured -- add a
# node4 service + entry here to scale further.

services:
  node1:
    build: ../server
    ports: ["7071:7070"]

  node2:
    build: ../server
    ports: ["7072:7070"]

  node3:
    build: ../server
    ports: ["7073:7070"]

  gateway:
    build: ../gateway
    ports: ["8000:8000"]
    environment:
      KV_NODES: "node1:7070,node2:7070,node3:7070"
    depends_on:
      - node1
      - node2
      - node3
